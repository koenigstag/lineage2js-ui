name: Deploy UI to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "packages/ui/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @lineage2js/ui build:pages
        env:
          VITE_SKILL_ICON_BASE_URL: ${{ secrets.VITE_SKILL_ICON_BASE_URL }}
          VITE_ITEM_ICON_BASE_URL: ${{ secrets.VITE_ITEM_ICON_BASE_URL }}
          VITE_ACTION_ICON_BASE_URL: ${{ secrets.VITE_ACTION_ICON_BASE_URL }}
          VITE_CLASS_ICON_BASE_URL: ${{ secrets.VITE_CLASS_ICON_BASE_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
